name: Build and Push Quarto-JA (Legal Auto-Build)

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Dockerfile'
  workflow_dispatch:

jobs:
  build-on-mac:
    name: Build on macOS Runner (arm64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Temporarily copy fonts from the macOS runner into the workspace (repository) so Docker can access them
      - name: Stage System Fonts legally
        run: |
          mkdir -p temp_fonts
          # Japanese fonts (Hiragino)
          cp "/System/Library/Fonts/ヒラギノ明朝 ProN.ttc" temp_fonts/ 2>/dev/null || true
          cp "/System/Library/Fonts/ヒラギノ丸ゴ ProN W4.ttc" temp_fonts/ 2>/dev/null || true
          cp "/System/Library/Fonts/ヒラギノ角ゴシック W0.ttc" temp_fonts/ 2>/dev/null || true
          cp "/System/Library/Fonts/ヒラギノ角ゴシック W1.ttc" temp_fonts/ 2>/dev/null || true
          cp "/System/Library/Fonts/ヒラギノ角ゴシック W2.ttc" temp_fonts/ 2>/dev/null || true
          cp "/System/Library/Fonts/ヒラギノ角ゴシック W3.ttc" temp_fonts/ 2>/dev/null || true
          cp "/System/Library/Fonts/ヒラギノ角ゴシック W4.ttc" temp_fonts/ 2>/dev/null || true
          cp "/System/Library/Fonts/ヒラギノ角ゴシック W5.ttc" temp_fonts/ 2>/dev/null || true
          cp "/System/Library/Fonts/ヒラギノ角ゴシック W6.ttc" temp_fonts/ 2>/dev/null || true
          cp "/System/Library/Fonts/ヒラギノ角ゴシック W7.ttc" temp_fonts/ 2>/dev/null || true
          cp "/System/Library/Fonts/ヒラギノ角ゴシック W8.ttc" temp_fonts/ 2>/dev/null || true
          cp "/System/Library/Fonts/ヒラギノ角ゴシック W9.ttc" temp_fonts/ 2>/dev/null || true
          # Chinese (bundled with macOS)
          cp "/System/Library/Fonts/STHeiti Light.ttc" temp_fonts/ 2>/dev/null || true
          cp "/System/Library/Fonts/STHeiti Medium.ttc" temp_fonts/ 2>/dev/null || true
          cp "/System/Library/Fonts/Hiragino Sans GB.ttc" temp_fonts/ 2>/dev/null || true
          # Latin serif / sans-serif
          cp /System/Library/Fonts/Optima.ttc temp_fonts/ 2>/dev/null || true
          cp /System/Library/Fonts/Palatino.ttc temp_fonts/ 2>/dev/null || true
          cp /System/Library/Fonts/Times.ttc temp_fonts/ 2>/dev/null || true
          cp /System/Library/Fonts/Helvetica.ttc temp_fonts/ 2>/dev/null || true
          cp /System/Library/Fonts/HelveticaNeue.ttc temp_fonts/ 2>/dev/null || true
          cp /System/Library/Fonts/Courier.ttc temp_fonts/ 2>/dev/null || true

      # 2. Set up Docker environment (macOS runner does not include Docker by default, so install buildx etc.)
      - name: Install Docker via Colima
        run: |
          brew install colima docker docker-buildx
          colima start --arch aarch64 --vm-type vz
          mkdir -p ~/.docker/cli-plugins
          ln -sfn $(brew --prefix)/opt/docker-buildx/bin/docker-buildx ~/.docker/cli-plugins/docker-buildx

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Build and push to Docker Hub
      - name: Build and Push (Native arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Runs on a macOS arm64 runner, so the image is built natively as arm64 at full speed
          platforms: linux/arm64
          tags: |
            mattocci/quarto-ja:latest
            mattocci/quarto-ja:1.9.38
          cache-from: type=gha
          cache-to: type=gha,mode=max
